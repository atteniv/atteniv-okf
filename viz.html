<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

", "source": "products/atteniv-platform", "target": "capabilities/compliance-automation"}}, {"data": {"id": "products/atteniv-platform__capabilities/hybrid-scheduling", "source": "products/atteniv-platform", "target": "capabilities/hybrid-scheduling"}}, {"data": {"id": "products/atteniv-platform__capabilities/nexus-radar", "source": "products/atteniv-platform", "target": "capabilities/nexus-radar"}}, {"data": {"id": "products/atteniv-platform__capabilities/atteniv-intelligence", "source": "products/atteniv-platform", "target": "capabilities/atteniv-intelligence"}}, {"data": {"id": "products/atteniv-platform__concepts/coffee-badging", "source": "products/atteniv-platform", "target": "concepts/coffee-badging"}}, {"data": {"id": "products/atteniv-platform__concepts/competitive-landscape", "source": "products/atteniv-platform", "target": "concepts/competitive-landscape"}}, {"data": {"id": "products/atteniv-platform__personas/hr-operations", "source": "products/atteniv-platform", "target": "personas/hr-operations"}}, {"data": {"id": "products/atteniv-platform__personas/facilities-real-estate", "source": "products/atteniv-platform", "target": "personas/facilities-real-estate"}}, {"data": {"id": "products/atteniv-platform__personas/compliance-director", "source": "products/atteniv-platform", "target": "personas/compliance-director"}}, {"data": {"id": "products/atteniv-platform__personas/cfo", "source": "products/atteniv-platform", "target": "personas/cfo"}}, {"data": {"id": "products/nexus-vision__concepts/convenience-of-the-employer-rule", "source": "products/nexus-vision", "target": "concepts/convenience-of-the-employer-rule"}}, {"data": {"id": "products/nexus-vision__concepts/reciprocity", "source": "products/nexus-vision", "target": "concepts/reciprocity"}}, {"data": {"id": "products/nexus-vision__concepts/tax-nexus", "source": "products/nexus-vision", "target": "concepts/tax-nexus"}}, {"data": {"id": "products/nexus-vision__capabilities/nexus-radar", "source": "products/nexus-vision", "target": "capabilities/nexus-radar"}}, {"data": {"id": "products/nexus-vision__products/atteniv-platform", "source": "products/nexus-vision", "target": "products/atteniv-platform"}}, {"data": {"id": "products/nexus-vision__nexus-radar/two-plane-architecture", "source": "products/nexus-vision", "target": "nexus-radar/two-plane-architecture"}}, {"data": {"id": "products/nexus-vision__access/nexus-vision-web", "source": "products/nexus-vision", "target": "access/nexus-vision-web"}}, {"data": {"id": "products/nexus-vision__access/rest-api", "source": "products/nexus-vision", "target": "access/rest-api"}}, {"data": {"id": "products/nexus-vision__access/mcp-server", "source": "products/nexus-vision", "target": "access/mcp-server"}}, {"data": {"id": "references/source-material__company/atteniv", "source": "references/source-material", "target": "company/atteniv"}}, {"data": {"id": "references/source-material__concepts/competitive-landscape", "source": "references/source-material", "target": "concepts/competitive-landscape"}}, {"data": {"id": "references/source-material__capabilities/atteniv-intelligence", "source": "references/source-material", "target": "capabilities/atteniv-intelligence"}}, {"data": {"id": "references/source-material__products/atteniv-platform", "source": "references/source-material", "target": "products/atteniv-platform"}}, {"data": {"id": "references/source-material__capabilities/nexus-radar", "source": "references/source-material", "target": "capabilities/nexus-radar"}}, {"data": {"id": "references/source-material__products/nexus-vision", "source": "references/source-material", "target": "products/nexus-vision"}}, {"data": {"id": "references/source-material__access/nexus-vision-web", "source": "references/source-material", "target": "access/nexus-vision-web"}}, {"data": {"id": "references/source-material__access/rest-api", "source": "references/source-material", "target": "access/rest-api"}}], "bodies": {"access/mcp-server": "The `atteniv-nexus` MCP server exposes the Nexus corpus to\n[Model Context Protocol](../concepts/model-context-protocol.md)-capable agents \u2014\nClaude, Cursor, or any other \u2014 with a single config block.\n\n# What It Enables\n\n* Browse states, complexity map, state profiles, and legislation.\n* Ask single-state and multi-state grounded, cited tax-nexus questions.\n* Manage chat conversations.\n\nInside the [Atteniv platform](../products/atteniv-platform.md), this same MCP is\nmounted server-side into core's AI chat (roadmap Tier 2.1 / FR-30), giving\nfootprint-aware grounded answers.\n\n# Citations\n\n[1] [Nexus Vision \u2014 API and developer access](https://nexus.atteniv.com)", "access/nexus-vision-web": "The web app is the free public face of [Nexus Vision](../products/nexus-vision.md).\nNo credit card and no lengthy onboarding \u2014 a focused workspace for exploring\nstate rules around remote and multi-state employment.\n\n# What It Offers\n\n* **Plain-English summaries** of each state's rules for HR and payroll audiences.\n* **Natural-language Q&A** over the corpus, with citations to the exact statute\n  sections relied on.\n* **Complexity ratings** \u2014 a color-coded posture map (no income tax / baseline /\n  guardrail / red-flag).\n* **Single- and multi-state scenarios** \u2014 describe a situation in plain language\n  and get one synthesized, cited answer.\n\n# Coverage\n\nAll 50 states + DC for profiles and complexity ratings; a subset of states live\nfor grounded Q&A (20 states at launch), with the general corpus as fallback.\n\n# Note on URL\n\nLaunch material references the public site under both `nexus.atteniv.com` and\n`atteniv.com`. Confirm the canonical production hostname before publishing this\nbundle externally.\n\n# Citations\n\n[1] [Nexus Vision](https://nexus.atteniv.com)", "access/rest-api": "The public REST API lets integrators bring Nexus answers into their own tools and\nworkflows. It is described by an OpenAPI 3.1 specification and is the\nserver-to-server [seam](../nexus-radar/two-plane-architecture.md) that\n[Nexus Radar](../capabilities/nexus-radar.md) calls.\n\n# What It Provides\n\n* **Versioned browse (public)** \u2014 states, complexity map, legislation, and state\n  profiles.\n* **Authenticated grounded Q&A** \u2014 single- and multi-state cited answers, plus\n  chat conversation management.\n\n# Security Posture\n\nJWT-enforced and **fail-closed**. All corpus calls are server-side; the service\ntoken never reaches the browser (NFR-4). Per-tenant quota metering wraps Q&A\ncalls, and a corpus `429` degrades gracefully (FR-36, NFR-8).\n\n# Note on URL\n\nInternal design material references the API under `nexus.atteniv.app`, while\nlaunch material uses `nexus.atteniv.com`. Confirm the canonical API hostname\nbefore publishing externally.\n\n# Citations\n\n[1] [Nexus Vision API documentation (OpenAPI 3.1)](https://nexus.atteniv.com)", "capabilities/atteniv-intelligence": "Atteniv Intelligence is the **AI capability layer** built on top of the Atteniv\ndata platform. It is included in **every tier** \u2014 not a premium add-on. The\ndepth of insight scales with each tier.\n\n# Tiers\n\n## Essentials \u2014 Standard Intelligence\n\nBasic compliance-summary queries and attendance reporting via natural language.\n\n* \"What's our current compliance rate?\"\n* \"How many violations are open this week?\"\n* Attendance summaries by team or manager.\n\n## Professional \u2014 Natural Language Analytics\n\nFull natural-language query access across all platform data, so HR leaders get\nanswers in real time without involving IT.\n\n* \"What is the average attendance rate across all offices this quarter?\"\n* \"Which teams have the most violations in the last 30 days?\"\n* \"How many employees are currently on accommodation plans?\"\n* Historical trend analysis and utilization reporting.\n\n## Enterprise \u2014 Master Atteniv Intelligence\n\nA fundamentally deeper product \u2014 not just answering questions, but anticipating\nproblems and generating strategic-level insight.\n\n* **Proactive risk detection** \u2014 flags at-risk employees *before* a violation\n  triggers escalation; surfaces pattern anomalies such as a compliance drop\n  correlated with a specific manager or department.\n* **Executive-grade reporting** \u2014 auto-generates compliance narrative reports for\n  board or executive review; cross-entity and multi-subsidiary comparisons.\n* **Industry benchmarking** \u2014 anonymized peer-data benchmarking (\"How does our\n  compliance rate compare to similar companies?\").\n* **Custom query building** \u2014 save and schedule recurring queries; API access to\n  the Intelligence layer for BI tools (Tableau, Power BI, etc.).\n\n## Strategic \u2014 Master Atteniv Intelligence, Custom\n\nAll Enterprise capabilities, plus org-specific model tuning, custom intelligence\npipelines, and fully bespoke reporting architecture.\n\n# Strategic AI Directions\n\nAtteniv Intelligence anchors a broader roadmap that shifts attendance from\nreactive tracking to predictive management:\n\n* **Proactive risk & anomaly detection** \u2014 detect \"compliance cascades\"\n  (non-compliance starting with a specific VP and trickling down) and \"policy\n  drift\" (a slow multi-month decline no single weekly report catches).\n* **Multi-state tax & nexus defense** \u2014 an \"Anomaly Engine\" runs daily network\n  location logs against 50-state threshold logic to warn finance teams before an\n  employee triggers [tax nexus](../concepts/tax-nexus.md) or international\n  Permanent Establishment risk. This is the intelligence behind\n  [Nexus Radar](nexus-radar.md).\n* **Real-estate & capacity optimization** \u2014 predictive forecasting and smart\n  schedule recommendations; see [office optimization](office-optimization.md).\n* **Employee-experience \"magnet\" approach** \u2014 smart collaboration nudges and\n  automated exception routing to reduce the \"hybrid coordination tax.\"\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)\n[2] [The Future of Compliance-First Workforce Intelligence (internal)](https://atteniv.com)", "capabilities/compliance-automation": "**Strategic Pillar II.** Turns [presence data](presence-detection.md) into\npolicy enforcement and progressive discipline \u2014 without invasive tracking or\nmanager firefighting.\n\n# What It Does\n\nAutomates the entire attendance disciplinary lifecycle \u2014 from first violation\nthrough termination review \u2014 with full documentation at every step. Managers get\nback the ~40% of administrative time otherwise spent on attendance tracking,\nfollow-up, and documentation.\n\n# How It Works\n\nConfigurable violation thresholds trigger automatic\n[progressive discipline](../concepts/progressive-discipline.md) escalation\n(default policy shown; the business-rules engine is fully configurable per\ncompany):\n\n| Violations | Action | Notification |\n|-----------|--------|--------------|\n| 4 | Verbal warning | Manager notified, 5-day response window |\n| 6 | Written warning | HR notified, documentation required |\n| 8 | Final warning | \u2014 |\n| 9 | Termination review | \u2014 |\n\nThe system auto-generates templated warning letters at each stage and tracks\nemployee acknowledgment of each warning.\n\nSupporting features (from the platform's Infractions surface): escalation status\nacross the configurable policy (Verbal \u2192 Written \u2192 Final \u2192 Termination),\nthreshold tracking, escalation progress bars, and CSV export for HR review.\n\n# Exception & Accommodation Management (Critical Differentiator)\n\nThe enforcement engine manages three accommodation types **natively \u2014 before any\naction is triggered.** No other attendance platform manages these exceptions\nwithin the enforcement engine itself; this is the primary ADA and FMLA risk\ndifferentiator.\n\n1. **Pre-return scheduling** \u2014 Phased return plans and modified hours after a\n   leave of absence. The violation counter does not begin until the modified\n   schedule is satisfied.\n2. **Ongoing ADA accommodations** \u2014 Permanent hybrid exceptions for employees\n   with disabilities. Tracked without expiration until formally removed. Never\n   trigger escalation.\n3. **Intermittent FMLA** \u2014 Protected variable absences. Excluded from violation\n   counting even without a predictable absence schedule.\n\n> The enforcement engine knows who the exceptions are *before* it acts, and the\n> audit trail is built for legal defensibility.\n\n# Related\n\n* [Hybrid scheduling](hybrid-scheduling.md) defines the in-office days this\n  capability enforces against.\n* Employees manage waivers and see their personal compliance score through the\n  self-service portal described in [hybrid scheduling](hybrid-scheduling.md).\n* See the [general counsel persona](../personas/general-counsel.md) for the\n  legal-defensibility use case.\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "capabilities/hybrid-scheduling": "**Strategic Pillar III.** Creates and manages hybrid work schedules at scale,\nensuring in-office days are enforced against a system \u2014 not just a calendar\ninvitation. The schedules defined here are what\n[compliance automation](compliance-automation.md) enforces against.\n\n# What It Does\n\nLets HR and managers design, assign, and monitor hybrid schedules across the\nwhole organization, then feeds those schedules into presence-based enforcement.\n\n# How It Works\n\n* **Visual day-by-day schedule interface** for HR and managers.\n* **Bulk employee assignment** by team, department, or policy group (e.g.,\n  Sales: Mon/Tue; Engineering: Wed/Thu).\n* **\"What-if\" capacity planning scenarios** to model different schedule\n  configurations before publishing.\n* **Automatic detection of unassigned employees** to prevent onboarding gaps.\n* **Employee self-service portal** \u2014 view personal schedule, submit remote-work\n  waiver requests, and see personal compliance score.\n\n# Platform Surfaces\n\n* **Team Schedules** \u2014 card-based schedule management with compliance-rate trend\n  indicators, day-rule assignments, and inline editing.\n* **Attendance Policy Builder** \u2014 design attendance policies with a live\n  capacity-impact preview, so mandates can be right-sized before they are\n  published.\n* **Employee Dashboard** \u2014 90-day attendance heatmap, compliance donut, pending\n  requests, and infraction counts per individual.\n\n# Related\n\n* Waiver requests submitted here (ADA, intermittent FMLA, client visits) are\n  evaluated by [compliance automation](compliance-automation.md)'s\n  accommodation engine, with AI-assisted routing from\n  [Atteniv Intelligence](atteniv-intelligence.md).\n* Capacity impact connects to [office optimization](office-optimization.md).\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "capabilities/nexus-radar": "Nexus Radar turns [presence data](presence-detection.md) into early warning on\nmulti-state [tax nexus](../concepts/tax-nexus.md) risk \u2014 and connects it to a\ncontinuously updated, citable regulatory knowledge base. It is a capability\ninside the paid [Atteniv platform](../products/atteniv-platform.md), and it\nshares its knowledge corpus with the free [Nexus Vision](../products/nexus-vision.md)\nproduct.\n\n# The Risk Surface\n\nWhere your people actually work determines your withholding, registration, and\nfiling obligations. Remote/hybrid work creates hidden, compounding multi-state\nliabilities across five obligation categories \u2014 payroll withholding, corporate\nincome tax, sales/use tax, franchise tax, and employment law \u2014 with penalties\nthat compound at roughly 5%/month up to 25% plus interest.\n\nHRIS knows an employee's home address; it is blind to daily physical work\nlocation. Atteniv's presence logs surface location mismatches (e.g., an employee\nclaiming Florida residency who is checking in from California) before a state\nauditor does.\n\n# The Intelligence Layer\n\nNexus Radar is Atteniv's state-by-state regulatory intelligence platform for\nremote-work tax nexus. It continuously monitors statutes, regulations, and\nagency guidance across covered states and translates changes into plain-language\nalerts and actionable next steps. It operates on\n[two planes](../nexus-radar/two-plane-architecture.md):\n\n* **Regulatory Intelligence** \u2014 ingests primary sources (statutes, regulations,\n  agency bulletins, bills in flight) across covered states and keeps a current,\n  citable picture of the rules. This is the corpus shared with\n  [Nexus Vision](../products/nexus-vision.md).\n* **Customer Compliance Operations** \u2014 applies those rules to your actual remote\n  workforce footprint, surfacing where withholding, registration, or filing\n  obligations may be triggered.\n\n# How It Works\n\nThe [early-warning engine](../nexus-radar/early-warning-engine.md) accumulates\nverified work-days per employee per state, evaluates them against the living\nrules in the corpus (day-one triggers, grace periods, and compound\nday-plus-wage thresholds), and fires tiered **Advisory \u2192 Warning \u2192 Critical**\nalerts *before* a breach. Each alert explains itself in plain English with a\nstatute citation. A state map colors by computed exposure rather than a static\ntier.\n\nSee the [capability roadmap](../nexus-radar/capability-roadmap.md) for the full\nset of planned capabilities and the [requirements](../nexus-radar/requirements.md)\nfor functional and non-functional detail.\n\n# Access Options\n\nThe same corpus is reachable three ways \u2014 see [access](../access/index.md):\n\n* [Nexus Vision web app](../access/nexus-vision-web.md) \u2014 free public research copilot.\n* [Public REST API](../access/rest-api.md) \u2014 versioned browse plus authenticated grounded Q&A.\n* [MCP server](../access/mcp-server.md) \u2014 for MCP-capable agents.\n\n# Guardrail\n\nAtteniv does not provide tax advice and does not determine tax liability or\nreplace tax counsel. Nexus Radar provides presence data, state-specific\nintelligence, and early risk visibility for review by the customer and their tax\nprofessionals.\n\n# Related\n\n* Serves the [VP of tax](../personas/vp-of-tax.md),\n  [payroll director](../personas/payroll-director.md),\n  [CFO](../personas/cfo.md),\n  [compliance director](../personas/compliance-director.md), and\n  [general counsel](../personas/general-counsel.md).\n* Powered by the [Atteniv Intelligence](atteniv-intelligence.md) anomaly engine.\n\n# Citations\n\n[1] [Nexus Vision](https://nexus.atteniv.com)\n[2] [Nexus Radar \u2014 Vision & Strategy (internal design)](https://atteniv.com)", "capabilities/office-optimization": "**Strategic Pillar IV.** Provides real-time and historical analytics on actual\noffice utilization from the [presence signal](presence-detection.md), enabling\ndata-driven decisions on real estate, staffing, and policy calibration. Real\nestate is typically a company's second-largest expense.\n\n# What It Does\n\nTurns presence data into real-estate and capacity decisions: stop paying for\nempty desks, and stop getting caught short on peak days. Space decisions become\nevidence-based, not guesswork.\n\n# How It Works\n\n* **Real-time dashboards** \u2014 utilization by location, team, and date (e.g.,\n  \"Denver office at 33% capacity today\").\n* **Historical trends** \u2014 seasonal variation, day-of-week patterns, rolling\n  averages.\n* **NetSuite integration** \u2014 cost analysis for \"true cost per employee per\n  desk.\" See [ERP / cost integrations](../integrations/erp-cost.md).\n* **Executive reporting** \u2014 compliance leaderboards, at-risk employee\n  visibility, and cross-office comparisons.\n\n# Platform Surfaces\n\n* **Office Cost Analysis** \u2014 overlays monthly rent and operating expenses against\n  actual per-employee attendance, surfacing the highest-cost office, the most\n  efficient office by capacity, and the true cost per actual attendee.\n* **Office Utilization Detail** \u2014 past-week utilization vs. total capacity,\n  peak/lowest attendance days, over-capacity alerts, and team-schedule loadings\n  per site.\n* **Office Management** \u2014 bird's-eye view of every facility with current capacity\n  utilization, active schedules, and QR-code badge check-in generation.\n* **Attendance Analytics** \u2014 30/90/180-day distribution of in-office, remote, and\n  absent days, with org-tree drill-down by team and individual.\n\n# AI-Assisted Optimization\n\nWith [Atteniv Intelligence](atteniv-intelligence.md), office optimization\nextends to predictive capacity forecasting, smart schedule recommendations (to\nprevent overcrowded Tuesdays and empty Fridays), and intelligent stack planning\nto identify underutilized leases that can be safely terminated.\n\n# Related\n\n* Serves the [facilities / real estate persona](../personas/facilities-real-estate.md)\n  and the [CFO persona](../personas/cfo.md).\n* Feeds from [hybrid scheduling](hybrid-scheduling.md) capacity data.\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "capabilities/presence-detection": "**Strategic Pillar I.** Presence Detection is the foundation of the\n[Atteniv platform](../products/atteniv-platform.md) \u2014 the single signal that\npowers compliance, office optimization, and Nexus Radar.\n\n# What It Does\n\nDetects actual physical office presence using existing endpoint security\ninfrastructure \u2014 **not** badge swipes, cameras, or new software. A device\nconnected to the office network means the employee is physically in the office.\n\nThe Presence Detection Engine continuously correlates three inputs into an\naudit-ready record of where each employee is actually working \u2014 by day, by\noffice, by jurisdiction:\n\n* Network-level presence (outbound NAT IP signals and device connections)\n* SSO / SAML session corroboration\n* Badge check-ins\n\n# How It Works\n\nThe flagship method analyzes outbound NAT IP signals on the corporate network:\nwhen an employee's egress IP matches the IPs associated with a specific office\nlocation, that employee is counted as present. A lightweight optional client is\navailable for environments where API access to security logs is restricted.\n\nAtteniv is deliberately **agnostic** about the detection method \u2014 organizations\nchoose the method or combination that fits their security posture and IT stack.\nSee [presence methods](../presence-methods/index.md) for all supported pathways,\nincluding [network detection](../presence-methods/network-detection.md),\n[the desktop agent](../presence-methods/desktop-agent.md),\n[badge swipe](../presence-methods/badge-swipe.md),\n[desk booking](../presence-methods/desk-booking.md),\n[QR kiosks](../presence-methods/qr-kiosk.md),\n[Wi-Fi access points](../presence-methods/wifi-access-point.md), and\n[mobile geofencing](../presence-methods/mobile-geofencing.md).\n\n# What It Is Not\n\nThis is **presence confirmation, not surveillance**:\n\n* No keystroke logging.\n* No screen capture.\n* No monitoring of work output or application usage.\n\n# Why It Matters\n\nTraditional approaches fail: badge data is gameable via\n[coffee badging](../concepts/coffee-badging.md), and HRIS location fields are\nself-reported and stale. Non-intrusive network detection is frictionless and\nprivacy-first \u2014 the presence signal is what makes\n[compliance automation](compliance-automation.md),\n[office optimization](office-optimization.md), and\n[Nexus Radar](nexus-radar.md) possible.\n\n# Integrations\n\nIntegrates with endpoint security vendors including Zscaler, Fortinet, Check\nPoint Harmony, and Microsoft Endpoint Defender. See\n[endpoint security integrations](../integrations/endpoint-security.md).\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "company/atteniv": "Atteniv builds hybrid-workforce management software that helps organizations\nunderstand and manage where and how their people work. The platform combines\nemployee **presence tracking** with **regulatory intelligence** to help HR and\npayroll teams stay ahead of compliance risk in a distributed-work world.\n\nAtteniv is headquartered in Denver, CO. Heidi Brown serves as Chief Marketing\nOfficer and Interim CEO.\n\n# What Atteniv Is\n\nAtteniv is a **policy enforcement and risk management platform for hybrid\norganizations**. It answers one question: *is your attendance policy being\nfollowed \u2014 consistently, fairly, and in a way that holds up legally?*\n\nAtteniv is **not** a productivity tool. It does not measure work output or\nperformance, and it does not add invasive monitoring. It operates entirely\nwithin the security and HR infrastructure an organization already has \u2014 no new\nhardware, no surveillance software, no behavior tracking.\n\nThe company ships two products:\n\n* The [Atteniv platform](../products/atteniv-platform.md) \u2014 the paid,\n  hybrid-workforce management product.\n* [Nexus Vision](../products/nexus-vision.md) \u2014 a free, public remote-work tax\n  research service.\n\n# The Problem It Solves\n\n## The Mandate-Compliance Gap\n\nCorporate return-to-office requirements have increased roughly **12% since early\n2024**, but actual attendance has not moved \u2014 a phenomenon analysts call the\n*Great Office Standoff*. The gap between \"policy exists\" and \"policy is enforced\"\nis unaddressed by standard HR and facilities tooling. See the\n[mandate-compliance gap](../concepts/mandate-compliance-gap.md) concept for why\nthe gap persists.\n\nEmployers face three simultaneous failures:\n\n1. **Compliance gap** \u2014 Policies exist on paper but are not enforced.\n   [Coffee badging](../concepts/coffee-badging.md) is common and invisible to\n   most tools.\n2. **Real estate misalignment** \u2014 Companies pay for unused space or scramble for\n   desks on peak days. Decisions are expensive guesswork without utilization\n   data.\n3. **Hidden multi-state tax risk** \u2014 A single remote employee performing\n   non-sales work in an unregistered state can void\n   [P.L. 86-272](../concepts/pl-86-272.md) protections and trigger full\n   corporate income [tax nexus](../concepts/tax-nexus.md), often retroactively.\n\n# Guiding Principle\n\n> Think of Atteniv as a smart thermostat for the modern office: it senses real\n> occupancy and adjusts policy, space, and compliance posture automatically,\n> without manual check-ins or self-reported badges.\n\n# Guardrail\n\nAtteniv does not provide tax advice and does not determine tax liability or\nreplace tax counsel. Atteniv provides presence data, state-specific\nintelligence, and early risk visibility for review by the customer and their tax\nprofessionals.\n\n# Citations\n\n[1] [Atteniv](https://atteniv.com)", "concepts/coffee-badging": "**Coffee badging** is swiping in (or being seen) at the office and leaving within\nminutes \u2014 long enough to register as \"present\" but not long enough to actually\nwork on site. It is common and largely invisible to badge- and access-based\ntools.\n\n# Why It Matters to Atteniv\n\nCoffee badging is the core reason badge data is *gameable* and why the\n[Atteniv platform](../products/atteniv-platform.md) leads with\n[network presence detection](../presence-methods/network-detection.md) rather\nthan [badge swipes](../presence-methods/badge-swipe.md). Methods that track stay\n*duration* \u2014 such as [Wi-Fi access point detection](../presence-methods/wifi-access-point.md) \u2014\nare specifically valuable for combating it. See the\n[mandate-compliance gap](mandate-compliance-gap.md).\n\n# Citations\n\n[1] [Work Anywhere. Compliant Everywhere. (internal)](https://atteniv.com)", "concepts/competitive-landscape": "Atteniv's unique position: the **only platform that combines non-invasive\n[presence detection](../capabilities/presence-detection.md) + compliance\nautomation + accommodation management** in a single system \u2014 and, with\n[Nexus Radar](../capabilities/nexus-radar.md), connects all of it to\nstate-by-state tax rules.\n\n# Category Comparison\n\n| Category | Example tools | What they do | What they miss |\n|----------|---------------|--------------|----------------|\n| Space / Facilities | Envoy, Robin, Skedda, Kadence, OfficeSpace | Desk booking, room reservations, badge check-ins | No compliance automation, no progressive discipline, no ADA/FMLA management; badge data gameable |\n| HRIS | Workday, UKG, BambooHR | Time tracking, HR records, scheduling | No actual presence detection, no automated escalation, no accommodation-aware enforcement |\n| Badge / Access Control | HID, Brivo, Proxy | Entry/exit tracking | Shows entry not presence; no compliance workflow; gameable |\n| Manual / Spreadsheet | Current state for most companies | Free, familiar | Inconsistent, legally fragile, time-intensive, no audit trail, blind to accommodations |\n| Payroll-vendor nexus guides | \u2014 | Generic reference content | Not connected to the actual workforce footprint |\n\n# The Differentiators\n\n* The enforcement engine knows who the exceptions are *before* it acts.\n* The audit trail is built for legal defensibility.\n* At scale, it surfaces workforce patterns and [policy drift](mandate-compliance-gap.md)\n  invisible to any other tool.\n\n# Citations\n\n[1] [What Atteniv Is (internal)](https://atteniv.com)\n[2] [Work Anywhere. Compliant Everywhere. (internal)](https://atteniv.com)", "concepts/convenience-of-the-employer-rule": "The **convenience-of-the-employer rule** (COE) can treat certain remote days as\ntaxable by the *employer's* state when the employee is working elsewhere for\npersonal convenience rather than employer necessity.\n\nNew York, for example, generally requires employers that maintain an office or\ntransact business in the state to withhold personal income tax, including on\nnonresidents paid for services performed in the state. Pennsylvania illustrates\nthe operational difficulty: employers must withhold from nonresident employees\nfor services performed in PA and must keep *\"adequate current records\"* to\ndetermine accurate PA-source compensation.\n\n> That last phrase is the part companies miss: **adequate current records.** A\n> payroll team cannot maintain them if the company does not know where employees\n> are actually working.\n\n# Why It Matters to Atteniv\n\nCOE-aggressor states (NY / DE / PA / NE) invert the usual sourcing logic \u2014 days\nworked at home can still be taxable \u2014 so the\n[early-warning engine](../nexus-radar/early-warning-engine.md) flags them for a\ndedicated workflow rather than clearing them. See [tax nexus](tax-nexus.md).\n\n# Citations\n\n[1] [Nexus Vision](https://nexus.atteniv.com)", "concepts/mandate-compliance-gap": "The **mandate-compliance gap** is the distance between \"policy exists\" and\n\"policy is enforced.\" Corporate RTO requirements rose roughly **12% since early\n2024**, but actual attendance has barely moved \u2014 what analysts call the *Great\nOffice Standoff*.\n\n# Why the Gap Persists\n\n* Managers spend ~40% of their day on administrative tasks, much of it\n  attendance tracking, follow-up, and documentation.\n* Badge data is gameable via [coffee badging](coffee-badging.md).\n* HR teams manage violations in spreadsheets with no consistent escalation path.\n* ADA accommodations and FMLA plans live in separate systems, creating legal\n  exposure when enforcement fires against protected employees.\n* Real estate decisions are made on assumed capacity, not actual utilization.\n\n# Why It Matters to Atteniv\n\nClosing this gap is the founding purpose of the\n[Atteniv platform](../products/atteniv-platform.md): non-invasive\n[presence detection](../capabilities/presence-detection.md) feeding\n[compliance automation](../capabilities/compliance-automation.md) with\naccommodation-aware [progressive discipline](progressive-discipline.md).\n\n# Citations\n\n[1] [What Atteniv Is (internal)](https://atteniv.com)", "concepts/model-context-protocol": "The **Model Context Protocol (MCP)** is an open protocol for connecting AI agents\nto external tools and data sources through a standard interface, so any\nMCP-capable client can consume a server's capabilities with a single config\nblock.\n\n# Why It Matters to Atteniv\n\nAtteniv ships an [`atteniv-nexus` MCP server](../access/mcp-server.md) that\nexposes the Nexus corpus \u2014 state browsing, legislation, and grounded cited Q&A \u2014\nto agents like Claude and Cursor. The same MCP is mounted server-side into the\n[Atteniv platform](../products/atteniv-platform.md)'s AI chat to power\nfootprint-aware answers.\n\n# Citations\n\n[1] [Nexus Vision \u2014 API and developer access](https://nexus.atteniv.com)", "concepts/pl-86-272": "**P.L. 86-272** is a federal law that protects a business from a state's net\nincome tax when its only activity in that state is soliciting orders for tangible\npersonal property (with orders approved and fulfilled from outside the state).\n\n# Why It Matters to Atteniv\n\nA single remote employee performing **non-sales** work in an unregistered state\ncan **void** P.L. 86-272 protection and trigger full corporate income\n[tax nexus](tax-nexus.md) \u2014 often **retroactively**. This is one of the hidden\nmulti-state tax risks the [Atteniv platform](../products/atteniv-platform.md)\nexists to surface: presence data reveals exactly this kind of activity before a\nstate auditor does.\n\n# Citations\n\n[1] [Work Anywhere. Compliant Everywhere. (internal)](https://atteniv.com)", "concepts/progressive-discipline": "**Progressive discipline** is the staged escalation of consequences for repeated\nattendance violations \u2014 moving from a verbal warning through a written warning\nand a final warning to a termination review, with documentation at every step.\n\n# Default Escalation Ladder\n\n| Violations | Stage |\n|-----------|-------|\n| 4 | Verbal warning |\n| 6 | Written warning |\n| 8 | Final warning |\n| 9 | Termination review |\n\nThresholds are fully configurable per company policy.\n\n# Why It Matters to Atteniv\n\n[Compliance automation](../capabilities/compliance-automation.md) automates this\nlifecycle \u2014 auto-generating templated warning letters, tracking acknowledgment,\nand (critically) excluding ADA and intermittent-FMLA accommodations from the\nviolation counter *before* any action fires. The full record is built for legal\ndefensibility; see the [general counsel persona](../personas/general-counsel.md).\n\n# Citations\n\n[1] [What Atteniv Is (internal)](https://atteniv.com)", "concepts/reciprocity": "**Reciprocity agreements** are arrangements between states that simplify\nwithholding for employees who live in one state and work in another \u2014 typically\nallowing the employee to be taxed and withheld only by their **home** state,\neliminating nonresident withholding in the work state.\n\n# Why It Matters to Atteniv\n\nReciprocity is both a *suppressor* and an *opportunity* in\n[Nexus Radar](../capabilities/nexus-radar.md):\n\n* The [early-warning engine](../nexus-radar/early-warning-engine.md) suppresses\n  nonresident-withholding obligations for reciprocal home\u2192work pairs before\n  evaluating a rule.\n* The Reciprocity & Safe Harbor Navigator (roadmap Tier 3.2) surfaces\n  **over-withholding** \u2014 money the org is needlessly withholding on a reciprocal\n  pair \u2014 and flags expired agreements.\n\nRelated: [tax nexus](tax-nexus.md).\n\n# Citations\n\n[1] [Nexus Vision](https://nexus.atteniv.com)", "concepts/tax-nexus": "**Tax nexus** is the connection that gives a state the authority to impose tax\nobligations on a business. For employers with remote and hybrid teams, employee\n*presence* can be one of the facts that creates it.\n\nA company may have no office, warehouse, or storefront in a state \u2014 but if an\nemployee works there, even temporarily, the company may need to ask whether that\npresence creates payroll, withholding, registration, unemployment insurance,\nworkers' compensation, corporate income tax, or sales tax obligations.\n\nThis is **not one national rule** \u2014 it is a state-by-state problem. Remote/hybrid\nwork creates hidden, compounding liabilities across five obligation categories:\npayroll withholding, corporate income tax, sales/use tax, franchise tax, and\nemployment law. Penalties compound at roughly 5%/month up to 25% plus interest.\n\n# Why It Matters to Atteniv\n\nHRIS knows an employee's home address but is blind to daily physical work\nlocation. [Nexus Radar](../capabilities/nexus-radar.md) closes that gap by\ncombining [presence detection](../capabilities/presence-detection.md) with a\nliving regulatory corpus, and [Nexus Vision](../products/nexus-vision.md) makes\nthe underlying rules searchable. Related concepts:\n[convenience-of-the-employer rule](convenience-of-the-employer-rule.md),\n[reciprocity](reciprocity.md), and [P.L. 86-272](pl-86-272.md).\n\n# Citations\n\n[1] [Nexus Vision](https://nexus.atteniv.com)", "integrations/endpoint-security": "These vendors are the source signal for\n[network presence detection](../presence-methods/network-detection.md) and\n[Wi-Fi access point detection](../presence-methods/wifi-access-point.md). Atteniv\nreads NAT IP / MAC signals via API \u2014 it does not add surveillance software.\n\n# Supported Tools\n\n| Vendor | Role |\n|--------|------|\n| Zscaler | Cloud security proxy \u2014 outbound NAT IP signal |\n| Fortinet | Firewall / SIEM logs |\n| Check Point Harmony | Endpoint security logs |\n| Microsoft Endpoint Defender | Endpoint / device connection signal |\n| Cisco Meraki | Wi-Fi controller \u2014 MAC-address presence and stay duration |\n\nFor environments where API access to these logs is restricted, the\n[lightweight desktop agent](../presence-methods/desktop-agent.md) is the\nfallback.\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "integrations/erp-cost": "ERP integration powers the cost side of\n[office optimization](../capabilities/office-optimization.md) \u2014 overlaying\nmonthly rent and operating expenses against actual per-employee attendance to\ncompute the \"true cost per employee per desk.\"\n\n# Supported Tools\n\n| Vendor | Role |\n|--------|------|\n| NetSuite | Cost analysis \u2014 rent and operating expense data |\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "integrations/hris": "Native HRIS integrations supply org hierarchy and employee records \u2014 the\nbaseline used by [compliance automation](../capabilities/compliance-automation.md)\nand by the [Nexus Radar early-warning engine](../nexus-radar/early-warning-engine.md)\n(home/tax state and employment dates).\n\n# Supported Tools\n\n| Vendor |\n|--------|\n| Workday |\n| UKG |\n\nNote: HRIS knows an employee's home address but is blind to daily physical work\nlocation \u2014 which is exactly the gap [presence detection](../capabilities/presence-detection.md)\nfills.\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "integrations/identity-sso": "SSO/SAML sessions from the existing identity provider are one of the three\nsignals the [presence detection engine](../capabilities/presence-detection.md)\ncorrelates (alongside network presence and badge check-ins).\n\n# Supported Tools\n\n| Vendor |\n|--------|\n| Okta |\n| Azure AD |\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "integrations/workspace-booking": "When an organization already uses hoteling or space-booking software, Atteniv can\ningest check-in status as proof of presence \u2014 see the\n[desk booking presence method](../presence-methods/desk-booking.md).\n\n# Supported Tools\n\n| Vendor |\n|--------|\n| Skedda |\n| Robin |\n| Archie |\n\nThese tools are also referenced in the\n[competitive landscape](../concepts/competitive-landscape.md) as space/facilities\nmanagement systems that lack compliance automation.\n\n# Citations\n\n[1] [Determining Office Presence \u2014 Atteniv's agnostic approach (internal)](https://atteniv.com)", "log": "# Bundle Update Log\n\n## 2026-07-20\n* **Initialization**: Created the Atteniv knowledge bundle from internal product and launch material.\n* **Creation**: Established the [company](company/index.md), [products](products/index.md), [capabilities](capabilities/index.md), [presence-methods](presence-methods/index.md), [nexus-radar](nexus-radar/index.md), [integrations](integrations/index.md), [access](access/index.md), [personas](personas/index.md), and [concepts](concepts/index.md) sections.\n", "nexus-radar/capability-roadmap": "The Nexus Radar roadmap is organized into five tiers, foundational \u2192\nforward-looking. Each phase is independently shippable; the ordering matters\nmore than dates. Effort is rough T-shirt sizing.\n\n# Tier 0 \u2014 Foundational Plumbing\n\nEverything rides on this.\n\n* **0.1 Retire the hardcoded states table** \u2014 make the corpus the regulatory\n  source of truth; nightly-sync a projection of state profiles. Corpus\n  authoritative; core caches. *(Effort: M.)*\n* **0.2 Citation + freshness everywhere** \u2014 every threshold/fact core displays\n  carries a source link into the corpus legislation and a \"last verified\" date.\n  *(Effort: S.)*\n\n# Tier 1 \u2014 The Early-Warning Engine\n\nThe actual Nexus Radar. See the [early-warning engine](early-warning-engine.md).\n\n* **1.1 Presence \u00d7 living rules \u2192 tiered alerts** \u2014 the highest-value single\n  item. *(Effort: L.)*\n* **1.2 Every alert explains itself, with a citation.** *(Effort: S given 1.1.)*\n* **1.3 Registration gap detector** \u2014 computed nexus vs. registrations.\n  *(Effort: S.)*\n\n# Tier 2 \u2014 Conversational & Advisory\n\nThe Natural Language Tax Advisor.\n\n* **2.1 Footprint-aware grounded chat** \u2014 mount the MCP into core's chat;\n  answers are cited and specific to the org's data. *(Effort: M.)*\n* **2.2 \"Explain this\" / \"Ask about this state\" affordances.** *(Effort: S given 2.1.)*\n* **2.3 Per-employee cited exposure narrative** \u2014 abstracted scenario in, cited\n  plain-English story out. *(Effort: M.)*\n\n# Tier 3 \u2014 Proactive Monitoring\n\nThe compounding moat.\n\n* **3.1 Footprint-scoped Legislative Change Monitor** \u2014 poll corpus legislation\n  for the org's footprint states; generate scoped impact briefs (\"NE LB1023\n  signed \u2014 affects your 14 employees with NE presence\"). Highest-differentiation\n  item; corpus side ~80% built. *(Effort: M.)*\n* **3.2 Reciprocity & Safe Harbor Navigator** \u2014 overlay\n  [reciprocity](../concepts/reciprocity.md) onto actual home\u2192work pairs; surface\n  over-withholding and flag expired agreements. *(Effort: M.)*\n* **3.3 Board-ready compliance digest** \u2014 periodic cited posture summary for\n  CFO/M&A readiness. *(Effort: M.)*\n\n# Tier 4 \u2014 Forward-Looking\n\n* **4.1 Pre-hire / relocation nexus check** \u2014 \"Candidate will work from Austin,\n  home state OK \u2192 new obligations?\" Extends to the What-If Scenario Modeler.\n  *(Effort: M.)*\n* **4.2 Employee self-service explainer** \u2014 plain-English \"here's your\n  multi-state situation\"; kills the #1 payroll ticket. *(Effort: M\u2013L.)*\n\n# Roadmap Mapping\n\n| Roadmap capability | This design |\n|--------------------|-------------|\n| Nexus Radar (Foundation, \"LIVE\") | Rebuilt properly as Tier 1 |\n| Nexus Exposure Map (Building) | Tier 1 map coloring by computed exposure |\n| Natural Language Tax Advisor (Next) | Tier 2 |\n| Legislative Change Monitor (Next) | Tier 3.1 |\n| Reciprocity & Safe Harbor Navigator (Next) | Tier 3.2 |\n| What-If Scenario Modeler (Planned) | Tier 4.1 |\n| Employee Tax Impact Dashboard (Future) | Tier 4.2 |\n\n# If Only Two Things Ship\n\n**1.1** makes Nexus Radar real; **3.1** is the moat (and is mostly already built\non the corpus side).\n\n# Deliberately Out of Scope\n\nWage Allocator / payroll write-back, Compliance Vault / COE Defense Builder,\nsales/use economic-nexus, and international Permanent Establishment monitoring\nremain on the roadmap but are later than the corpus-integration work above.\n\n# Citations\n\n[1] [Nexus Radar \u2014 Vision & Strategy (internal design)](https://atteniv.com)", "nexus-radar/early-warning-engine": "The early-warning engine is the heart of [Nexus Radar](../capabilities/nexus-radar.md):\n**verified presence \u00d7 living rules \u2192 tiered, cited alerts, before a breach.** It\nis deterministic and runs on cached structured data \u2014 no LLM in the hot path.\n(An LLM is used only on demand, to enrich an alert's explanation.)\n\n# Inputs and Outputs\n\n**Inputs**\n\n* **Presence** \u2014 resolved state, user, and check-in time from the presence log.\n* **Employee baseline** \u2014 home/tax state and employment dates, plus offices.\n* **Rules** \u2014 a cached projection of the corpus: day-one flag, grace-period days,\n  compound wage trigger, [reciprocity](../concepts/reciprocity.md) partners, and\n  [convenience-of-the-employer](../concepts/convenience-of-the-employer-rule.md)\n  stance.\n* **Registrations** \u2014 where the organization is registered.\n\n**Outputs**\n\n* Threshold-tracker rows (per employee \u00d7 state \u00d7 tax year).\n* Alert events (Advisory / Warning / Critical), each with explanation +\n  citations.\n* Aggregates for the map (state coloring by computed exposure) and dashboards.\n\n# Pipeline\n\n1. Compute presence delta since the last run.\n2. Aggregate work-days per employee \u00d7 state \u00d7 tax year.\n3. Apply reciprocity & residency suppression (remove home-state and reciprocal\n   pairs).\n4. Load rules from the cached corpus projection.\n5. Evaluate by rule type (day-one / grace-period / compound).\n6. Compute percent-to-threshold \u2192 status + severity.\n7. Upsert the threshold tracker; emit an alert event **only on status\n   transition**, with a citation snapshot.\n\n# Day Aggregation Rules\n\nAggregating \"work days in a state\" is where correctness lives:\n\n* **Unit of presence** \u2014 one connection in a state on a calendar date = one\n  work-day; de-duplicate multiple connections on the same date.\n* **Home/office state** \u2014 days in the resident or assigned-office state are\n  baseline and do not create nonresident nexus; tracked separately.\n* **Partial/travel days** \u2014 store the raw count and apply state-specific rules;\n  flag states whose rules aren't yet modeled.\n* **Tax-year scoping** \u2014 thresholds reset per period (calendar year most common;\n  some rolling 12-month); aggregation windows must match.\n* **Non-working days** \u2014 weekends/PTO with an incidental connection should not\n  count as work-days.\n\n# Threshold Evaluation by Rule Type\n\n| Rule type | Breach condition | \"Approaching\" |\n|-----------|------------------|---------------|\n| Day-one | first work-day in state | jumps straight to Critical on day 1 |\n| Grace-period (days) | days present > grace-period days | pct \u2265 warn-at (default 0.8) |\n| Compound (days + wages) | both (`and`) or either (`or`) met | either component approaching |\n| Economic nexus | out of scope for Tier 1 (no revenue data in core) | \u2014 |\n\n# Severity Mapping (default; admin-configurable)\n\n| Severity | Label | Default trigger |\n|----------|-------|-----------------|\n| info | Advisory | pct \u2265 0.6 and < 0.8 |\n| warning | Warning | pct \u2265 0.8 and < 1.0 |\n| critical | Critical | pct \u2265 1.0 (breached), day-one trigger fired, or breach with no active registration |\n\nAn event fires only on status transition to avoid alert spam.\n\n# Reciprocity & Residency Suppression\n\nBefore evaluating a work-state rule, the engine suppresses obligations that\n[reciprocity](../concepts/reciprocity.md) or residency removes \u2014 surfacing a\nreciprocity *opportunity* if the org is over-withholding. Convenience-of-the-\nemployer aggressor states (NY/DE/PA/NE) invert the usual logic and are flagged\nfor a dedicated workflow rather than cleared.\n\n# Explanation & Citations\n\n* **Cheap path (default)** \u2014 template the explanation from cached structured\n  fields and attach source citations. Zero LLM cost.\n* **Rich path (on demand)** \u2014 when a user clicks \"Explain,\" call grounded Q&A for\n  a scenario-specific cited paragraph and cache it. Quota-aware; never in the\n  batch loop.\n\nExample templated explanation:\n\n> **IL \u2014 Warning.** 4 employees have worked 26+ days in Illinois; nonresident\n> withholding is required after 30 working days. Source: 35 ILCS 5/701 (via\n> corpus). Registered: No \u2192 escalates to Critical on breach.\n\n# Execution Model\n\n* **Incremental batch** \u2014 triggered by new presence; processes only the delta.\n  Target: threshold calc within ~1 minute of new location data.\n* **Idempotent** \u2014 re-running over the same window must not double-emit events.\n* **Per-tenant isolation** \u2014 all queries scoped by organization; RLS enforced.\n* **Backfill mode** \u2014 a one-shot historical pass (retroactive nexus study) when\n  an org first enables Nexus Radar.\n\n# Edge Cases\n\n* **VPN/egress misattribution** \u2014 IP\u2192state can be wrong; support an HR\n  confirmation step before a Critical drives action.\n* **No-income-tax states** \u2014 never fire withholding alerts.\n* **Unmodeled state** \u2014 mark tracker `safe` but flag `unmodeled` so it's visible,\n  not silently treated as compliant.\n* **Mid-year threshold change** \u2014 the tracker snapshots the rule at eval time;\n  the Legislative Change Monitor surfaces the delta.\n\n# Related\n\n* Depends on the [two-plane architecture](two-plane-architecture.md) cache.\n* Specified by [requirements](requirements.md) FR-10 through FR-22.\n\n# Citations\n\n[1] [Nexus Radar \u2014 Early-Warning Engine (internal design)](https://atteniv.com)", "nexus-radar/requirements": "Requirement IDs are stable references. Priority: **P0** (must, gates the tier),\n**P1** (should), **P2** (nice). Each maps back to a tier in the\n[capability roadmap](capability-roadmap.md).\n\n# Functional Requirements\n\n## Tier 0 \u2014 Seam & Source of Truth\n\n| ID | Requirement | Priority |\n|----|-------------|----------|\n| FR-1 | Core authenticates to the Nexus Vision public API with a machine-scoped service credential, server-side only. | P0 |\n| FR-2 | A nightly job syncs all 50+DC state profiles + complexity buckets into the regulatory cache. | P0 |\n| FR-3 | All regulatory facts shown in core read from the cache, not a hardcoded states table. | P0 |\n| FR-4 | The hardcoded states table is retired after dual-read parity is verified. | P0 |\n| FR-5 | Every regulatory fact displayed carries a source citation and a \"last verified\" timestamp. | P1 |\n| FR-6 | If the corpus is unreachable, core serves the last cached projection with a freshness warning. | P0 |\n| FR-7 | Corpus response payloads are validated at the boundary before entering core. | P0 |\n\n## Tier 1 \u2014 Early-Warning Engine\n\n| ID | Requirement | Priority |\n|----|-------------|----------|\n| FR-10 | Aggregate verified work-days per employee \u00d7 state \u00d7 tax year, de-duplicated per calendar date. | P0 |\n| FR-11 | Home/resident-state and reciprocal-pair days are suppressed from nonresident evaluation. | P0 |\n| FR-12 | Evaluate day-one, grace-period, and compound (days + wages) rule types from the cache. | P0 |\n| FR-13 | Emit tiered alerts (Advisory / Warning / Critical) on status transition only. | P0 |\n| FR-14 | Alert severity thresholds are admin-configurable per org, with sensible defaults. | P1 |\n| FR-15 | Each alert includes a plain-English explanation and citation snapshot. | P0 |\n| FR-16 | Each alert records the exact triggering rule values at fire time (audit snapshot). | P0 |\n| FR-17 | The map colors states by computed exposure blended with complexity bucket. | P0 |\n| FR-18 | Per-state drill-down shows employee roster, day-counts, status, registration, rule + citation. | P0 |\n| FR-19 | Dashboard top-line metrics: Active Jurisdictions, Approaching Nexus, Employees Out-of-State. | P1 |\n| FR-20 | A backfill mode runs a retroactive pass over historical presence on first enablement. | P1 |\n| FR-21 | Registration-gap detector flags \"nexus without registration\" and the inverse. | P1 |\n| FR-22 | Unmodeled states/rules are flagged visibly, never silently treated as compliant. | P0 |\n\n## Tier 2 \u2014 Conversational Advisor\n\n| ID | Requirement | Priority |\n|----|-------------|----------|\n| FR-30 | The MCP is mounted into core's AI chat, server-side. | P1 |\n| FR-31 | Grounded answers inject the org's footprint context and remain state-cited. | P1 |\n| FR-32 | Alerts, state panels, and employee rows expose an \"Explain / Ask about this\" affordance. | P1 |\n| FR-33 | Per-employee cited narratives are generated from abstracted scenarios (no PII across the seam). | P1 |\n| FR-34 | Q&A affordances show a coverage badge; non-live states fall back or hide the affordance. | P0 |\n| FR-35 | Every grounded answer is persisted with its citations and a scenario hash. | P1 |\n| FR-36 | Per-tenant quota metering wraps all Q&A calls; corpus 429 degrades gracefully. | P0 |\n\n## Tier 3 & 4 \u2014 Proactive and Forward-Looking\n\n| ID | Requirement | Priority |\n|----|-------------|----------|\n| FR-40 | A poller detects new/changed legislation in footprint states and emits scoped impact briefs. | P1 |\n| FR-41 | Impact briefs are plain-English and name the affected employee count/scope. | P1 |\n| FR-42 | A weekly digest summarizes new nexus, approaching thresholds, changes, and reciprocity. | P2 |\n| FR-43 | Reciprocity navigator surfaces over-withholding on actual pairs; flags expired agreements. | P1 |\n| FR-44 | A board/M&A-ready cited compliance summary can be generated on demand. | P2 |\n| FR-50 | Pre-hire/relocation what-if previews new obligations for a prospective home+work state. | P2 |\n| FR-51 | Employee self-service explainer of their own multi-state situation, with disclaimers. | P2 |\n\n# Non-Functional Requirements\n\n| ID | Requirement | Target |\n|----|-------------|--------|\n| NFR-1 | Threshold calculation latency after new presence data | < 1 minute |\n| NFR-2 | Nexus Radar dashboard load | < 3 seconds |\n| NFR-3 | No PII crosses the seam | Enforced by abstracted-scenario contract |\n| NFR-4 | All corpus calls server-side; service token never reaches the browser | Absolute |\n| NFR-5 | Alerts + Q&A answers retained with immutable audit trail | 7 years (tax audit statute) |\n| NFR-6 | Bulk paths never call LLM Q&A | Architectural invariant |\n| NFR-7 | Per-tenant isolation on all engine + cache reads | RLS enforced |\n| NFR-8 | Graceful degradation on corpus 401/403/429/5xx | No user-facing crash |\n| NFR-9 | Regulatory facts trace to a corpus citation + version | 100% of displayed facts |\n| NFR-10 | \"Not tax advice\" disclaimer on every generated answer | Absolute |\n\n# User Stories by Persona\n\n* **[VP of Tax](../personas/vp-of-tax.md)** \u2014 see active vs. approaching nexus\n  at a glance (US-1); every alert cites its statute (US-2); be told when a law\n  changes where we have people (US-3).\n* **[Payroll Director](../personas/payroll-director.md)** \u2014 drill into a state to\n  see which employees drive exposure (US-4); be warned *before* a threshold is\n  crossed (US-5); know where we over-withhold due to reciprocity (US-6).\n* **[CFO](../personas/cfo.md)** \u2014 a single dashboard of total exposure for board\n  and M&A (US-7); an on-demand cited compliance summary for diligence (US-8).\n* **[HR Manager](../personas/hr-operations.md)** \u2014 ask plain-English questions\n  grounded in our footprint (US-9); a pre-hire nexus check (US-10).\n* **[General Counsel](../personas/general-counsel.md)** \u2014 every alert and answer\n  carries an immutable, cited audit trail (US-11).\n* **[Employee](../personas/employee.md)** \u2014 a plain-English explanation of my\n  multi-state situation (US-12).\n\n# Citations\n\n[1] [Nexus Radar \u2014 Requirements (internal design)](https://atteniv.com)", "nexus-radar/two-plane-architecture": "Nexus Radar is organized as **two planes** that are joined but never merged.\nThis is the discipline that keeps the shared regulatory corpus authoritative\nwhile keeping customer data private.\n\n# The Two Planes\n\n* **Regulatory-intelligence plane** \u2014 the [Nexus Vision](../products/nexus-vision.md)\n  corpus. The source of truth for every rule, threshold, reciprocity fact, and\n  citation. It is *never duplicated into* the core application.\n* **Customer-compliance-ops plane** \u2014 the Atteniv core database. The source of\n  truth for this organization's employees, presence days, registrations,\n  alerts, and documents. It *never leaves* core.\n\n# The Seam\n\nThe two planes are joined by the [public API](../access/rest-api.md) /\n[MCP server](../access/mcp-server.md), called **server-to-server**. Core sends\n**abstracted scenarios** (e.g., \"resident of NJ, 15 days in ME, $4k sourced\") \u2014\n**never employee PII**.\n\n# The Key Discipline\n\nThe split forces two rules that keep the system correct and affordable:\n\n* **Structured/cached corpus data drives bulk computation** \u2014 threshold math over\n  thousands of employee-days runs against a cached projection of the corpus.\n* **LLM Q&A endpoints drive on-demand explanation only** \u2014 they are quota-limited\n  and never called in a loop.\n\n# What Each Side Has\n\n**Core** (the verified *where*): a presence engine that resolves every employee\nconnection to a US state via network egress, plus organization registration\nrecords. See [presence detection](../capabilities/presence-detection.md).\n\n**Nexus Vision** (the cited *so what*): a grounded, cited regulatory corpus;\nstate profiles for all 50 states + DC with complexity buckets\n(baseline / guardrail / red_flag / no_income_tax), scored dimensions, and curated\nproperties; legislation with full text and AI interpretations; and single- and\nmulti-state cited Q&A.\n\n# What We Deliberately Do NOT Do\n\n* Not re-ingesting the corpus into core \u2014 cache projections; call live for\n  Q&A/legislation.\n* Not hardcoding rules in core \u2014 if a rule isn't in the corpus, that's a corpus\n  gap to close, not a constant to add.\n* Not sending employee PII across the seam \u2014 abstracted scenarios only.\n* Not calling LLM Q&A in bulk loops \u2014 bulk math uses cached structured data.\n\n# Related\n\n* [Early-warning engine](early-warning-engine.md) consumes the cached corpus\n  projection.\n* [Requirements](requirements.md) FR-1 through FR-7 specify the seam and\n  source-of-truth behavior.\n\n# Citations\n\n[1] [Nexus Radar \u2014 Vision & Strategy (internal design)](https://atteniv.com)", "personas/cfo": "The CFO cares about total exposure and the second-largest line item on the books:\nreal estate.\n\n# What They Need\n\n* A single dashboard of total multi-state exposure for board reporting and M&A\n  readiness. *(US-7)*\n* An on-demand cited compliance summary that can be handed to diligence in under\n  48 hours. *(US-8)*\n* To right-size the real-estate footprint with evidence, not guesswork.\n\n# How Atteniv Serves Them\n\nDashboard top-line metrics (FR-19), the board-ready compliance digest (roadmap\nTier 3.3 / FR-44), and [office optimization](../capabilities/office-optimization.md)\ncost analysis via [NetSuite](../integrations/erp-cost.md).\n\n# Citations\n\n[1] [Nexus Radar \u2014 Requirements (internal design)](https://atteniv.com)\n[2] [Atteniv platform overview](https://atteniv.com)", "personas/compliance-director": "The Compliance Director is responsible for multi-state regulatory risk across the\nworkforce.\n\n# What They Need\n\n* Early visibility into multi-state [nexus](../concepts/tax-nexus.md) exposure\n  before it becomes audit exposure.\n* A defensible, current picture of obligations across every state where people\n  work.\n\n# How Atteniv Serves Them\n\n[Nexus Radar](../capabilities/nexus-radar.md)'s early-warning alerts, the\nregistration-gap detector (FR-21), and citation + freshness on every displayed\nfact (roadmap Tier 0.2).\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "personas/employee": "The employee is the subject of presence detection and the beneficiary of\nself-service tooling.\n\n# What They Need\n\n* View their personal schedule, submit remote-work waiver requests, and see their\n  personal compliance score.\n* A plain-English explanation of their own multi-state situation, so they stop\n  filing payroll tickets. *(US-12)*\n\n# How Atteniv Serves Them\n\nThe self-service portal and Employee Dashboard in\n[hybrid scheduling](../capabilities/hybrid-scheduling.md), and the employee\nself-service tax explainer (roadmap Tier 4.2 / FR-51), with disclaimers.\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)\n[2] [Nexus Radar \u2014 Requirements (internal design)](https://atteniv.com)", "personas/facilities-real-estate": "Facilities and Real Estate leaders decide how much space the organization needs\nand must justify lease decisions.\n\n# What They Need\n\n* Right-size space using real utilization data, not assumed capacity.\n* Justify lease renewals, consolidations, and terminations with evidence.\n* Avoid both paying for empty desks and getting caught short on peak days.\n\n# How Atteniv Serves Them\n\n[Office optimization](../capabilities/office-optimization.md): real-time and\nhistorical utilization, cost analysis, over-capacity alerts, and AI-assisted\nstack planning that identifies underutilized leases.\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)", "personas/general-counsel": "General Counsel cares about legal defensibility \u2014 of both attendance enforcement\nand tax positions.\n\n# What They Need\n\n* Every alert and answer to carry an immutable, cited audit trail, to defend\n  against aggressive audits. *(US-11)*\n* Enforcement that is accommodation-aware, so discipline never fires against a\n  protected employee.\n\n# How Atteniv Serves Them\n\nAudit-snapshot alerts (FR-16), 7-year immutable retention of alerts and answers\n(NFR-5), the accommodation-aware\n[compliance automation](../capabilities/compliance-automation.md) engine, and the\nAudit Defensible Kit that packages the full compliance record for outside\ncounsel.\n\n# Citations\n\n[1] [Nexus Radar \u2014 Requirements (internal design)](https://atteniv.com)\n[2] [Atteniv platform overview](https://atteniv.com)", "personas/hr-operations": "HR Operations and People Ops leaders enforce hybrid policies and support employee\nmoves, remote hires, and hybrid policy design.\n\n# What They Need\n\n* Enforce hybrid policies without surveillance and automate\n  [progressive discipline](../concepts/progressive-discipline.md).\n* Ask plain-English questions and get answers grounded in the actual footprint.\n  *(US-9)*\n* A pre-hire nexus check before extending an offer in a new state. *(US-10)*\n\n# How Atteniv Serves Them\n\n[Compliance automation](../capabilities/compliance-automation.md) with\naccommodation-aware enforcement, [hybrid scheduling](../capabilities/hybrid-scheduling.md),\nfootprint-aware grounded chat (roadmap Tier 2), and the pre-hire what-if check\n(roadmap Tier 4.1).\n\n# Citations\n\n[1] [Atteniv platform overview](https://atteniv.com)\n[2] [Nexus Radar \u2014 Requirements (internal design)](https://atteniv.com)", "personas/payroll-director": "The Payroll Director manages multi-state withholding, SUI, and registrations.\n\n# What They Need\n\n* Drill into a state and see which employees drive the exposure, to adjust\n  withholding before the payroll cycle. *(US-4)*\n* Be warned *before* an employee crosses a threshold, not after. *(US-5)*\n* Know where the company is over-withholding due to\n  [reciprocity](../concepts/reciprocity.md), so it can stop. *(US-6)*\n\n# How Atteniv Serves Them\n\nPer-state drill-down (FR-18), transition-based tiered alerts\n([early-warning engine](../nexus-radar/early-warning-engine.md)), and the\nReciprocity & Safe Harbor Navigator (roadmap Tier 3.2).\n\n# Citations\n\n[1] [Nexus Radar \u2014 Requirements (internal design)](https://atteniv.com)", "personas/vp-of-tax": "The VP of Tax owns the organization's multi-state [tax nexus](../concepts/tax-nexus.md)\nexposure and is the primary user of [Nexus Radar](../capabilities/nexus-radar.md).\n\n# What They Need\n\n* See at a glance which states have active nexus and which are approaching\n  thresholds, to prioritize compliance actions. *(US-1)*\n* Have each alert cite the statute it is based on, so it can be trusted and\n  defended. *(US-2)*\n* Be told when a law changes in a state where the company has people, so they are\n  never blindsided. *(US-3)*\n\n# How Atteniv Serves Them\n\nThe [early-warning engine](../nexus-radar/early-warning-engine.md) surfaces\ncomputed exposure with cited explanations; the Legislative Change Monitor\n(roadmap Tier 3.1) delivers footprint-scoped impact briefs.\n\n# Citations\n\n[1] [Nexus Radar \u2014 Requirements (internal design)](https://atteniv.com)", "presence-methods/badge-swipe": "The most common traditional method for tracking attendance: integrating with\nexisting physical security and turnstile systems.\n\n# How It Works\n\nWhen an employee swipes their badge to unlock a door, the access-control system\nsecurely passes a webhook or log to Atteniv.\n\n# The Upside\n\nLeverages existing physical security infrastructure with no changes to the\nemployee's routine.\n\n# The Downside\n\nVulnerable to [coffee badging](../concepts/coffee-badging.md) \u2014 an employee\nswipes in just to be seen and leaves immediately \u2014 unless the organization also\nstrictly monitors swipe-out times for duration tracking. This gameability is a\ncore reason Atteniv leads with\n[network presence detection](network-detection.md) instead.\n\n# Citations\n\n[1] [Determining Office Presence \u2014 Atteniv's agnostic approach (internal)](https://atteniv.com)", "presence-methods/desk-booking": "If an organization already uses \"hoteling\" or space-booking software such as\nSkedda, Robin, or Archie, Atteniv can use this data to establish presence. See\n[workspace booking integrations](../integrations/workspace-booking.md).\n\n# How It Works\n\nWhen an employee arrives at the office, they interact with their booking app to\n\"claim\" or check into their reserved desk or room. Atteniv ingests this check-in\nstatus as proof of presence.\n\n# The Upside\n\nPiggybacks on tools employees are already required to use for daily logistics.\n\n# The Downside\n\nRelies on human behavioral compliance: employees may arrive but simply forget to\nhit the \"check-in\" button, creating false absences.\n\n# Citations\n\n[1] [Determining Office Presence \u2014 Atteniv's agnostic approach (internal)](https://atteniv.com)", "presence-methods/desktop-agent": "For organizations unable to provide direct firewall or SIEM log access, Atteniv\noffers a proprietary, **lightweight Go client** that can be deployed via MDM to\nemployee laptops (Windows or Mac). It is the fallback for\n[network presence detection](network-detection.md).\n\n# How It Works\n\nRunning quietly in the background, the client detects when the user's public NAT\nIP address changes and matches it against Atteniv's database of known office IP\naddresses.\n\n# The Upside\n\nHighly accurate, and bypasses complex backend network integrations.\n\n# The Downside\n\nRequires IT to package and deploy software directly onto employee devices.\n\n# Citations\n\n[1] [Determining Office Presence \u2014 Atteniv's agnostic approach (internal)](https://atteniv.com)", "presence-methods/mobile-geofencing": "Some enterprise HCM platforms (like Workday) use geofencing through a corporate\nmobile app; Atteniv can support the same pattern.\n\n# How It Works\n\nIf the company uses an Atteniv mobile app, the app can use location services to\ndetect when an employee crosses the \"geofence\" of the office building,\nautomatically checking them in.\n\n# The Upside\n\nCompletely frictionless for the employee, as long as they have their phone in\ntheir pocket.\n\n# The Downside\n\nCan trigger severe privacy concerns among employees who do not want their\nemployer tracking their smartphone's location services \u2014 a notable contrast with\nthe privacy-first [network detection](network-detection.md) method.\n\n# Citations\n\n[1] [Determining Office Presence \u2014 Atteniv's agnostic approach (internal)](https://atteniv.com)", "presence-methods/network-detection": "The flagship [presence detection](../capabilities/presence-detection.md)\napproach. It leverages the endpoint security infrastructure an organization\nalready has in place, integrating via API with leading security vendors such as\nZscaler, Fortinet, Check Point Harmony, or Microsoft Defender. See\n[endpoint security integrations](../integrations/endpoint-security.md).\n\n# How It Works\n\nAtteniv analyzes firewall logs to identify when an employee's outbound NAT IP\naddress matches the IP addresses associated with a specific corporate office\nlocation. A device connected to the office network means the employee is\nphysically in the office.\n\n# The Upside\n\nFrictionless and \"privacy-first\": requires no new hardware and avoids the \"Big\nBrother\" feel of invasive surveillance.\n\n# The Downside\n\nHighly regulated InfoSec teams may initially be reluctant to provide API access\nto these logs.\n\n# Fallback\n\nFor organizations that cannot provide log access, the\n[lightweight desktop agent](desktop-agent.md) achieves the same result at the\nendpoint.\n\n# Citations\n\n[1] [Determining Office Presence \u2014 Atteniv's agnostic approach (internal)](https://atteniv.com)", "presence-methods/qr-kiosk": "Perhaps the simplest, lowest-barrier method: a tablet or scanning kiosk at the\noffice reception or entrance. QR-code generation for office check-in is built\ninto the [Office Management surface](../capabilities/office-optimization.md).\n\n# How It Works\n\nA digital barcode or QR code is automatically regenerated daily on the kiosk.\nEmployees use their mobile device to scan the code upon entering, which instantly\nmarks them as \"present\" in Atteniv.\n\n# The Upside\n\nExtremely easy to deploy, highly visible, and requires zero integration with\ncomplex internal IT systems.\n\n# The Downside\n\nAdds a manual, administrative step to the employee's morning routine.\n\n# Citations\n\n[1] [Determining Office Presence \u2014 Atteniv's agnostic approach (internal)](https://atteniv.com)", "presence-methods/wifi-access-point": "Similar to [network presence detection](network-detection.md), this method\nintegrates directly with local Wi-Fi controllers such as Cisco Meraki (already\nan Atteniv integration partner). See\n[endpoint security integrations](../integrations/endpoint-security.md).\n\n# How It Works\n\nThe system checks whether an employee's registered MAC address (laptop or\ncorporate mobile phone) is currently connected to the access point.\n\n# The Upside\n\nPassive, highly accurate, and excellent for tracking the *duration* of an\nemployee's stay \u2014 which combats [coffee badging](../concepts/coffee-badging.md).\n\n# The Downside\n\nEmployees must ensure their Wi-Fi is on and connected to the correct corporate\nnetwork to be counted.\n\n# Citations\n\n[1] [Determining Office Presence \u2014 Atteniv's agnostic approach (internal)](https://atteniv.com)", "products/atteniv-platform": "**Work Anywhere. Compliant Everywhere.**\n\nThe Atteniv platform is a cloud-based workforce presence detection and\ncompliance platform for the hybrid workplace. It uses the security\ninfrastructure an organization already runs \u2014 Zscaler, Fortinet, Microsoft\nDefender, and similar network stacks \u2014 to passively detect *when and where*\nemployees are actually working, then turns that signal into actionable outcomes\nacross compliance, real estate, and tax risk. No cameras, no keystroke loggers,\nno new software to deploy on endpoints.\n\n# The One Signal, Three Surfaces\n\nAtteniv's [presence detection engine](../capabilities/presence-detection.md)\nsits on top of the existing network, identity, and HRIS stack. It continuously\ncorrelates network-level presence, SSO/SAML sessions, and badge check-ins into\nan audit-ready record of where each employee is actually working \u2014 by day, by\noffice, by jurisdiction.\n\nThat one signal powers the platform's product surfaces:\n\n| Surface | Capability | Outcome |\n|---------|-----------|---------|\n| Office Optimization | [Office utilization & optimization](../capabilities/office-optimization.md) | Stop paying for empty desks; space decisions become evidence-based. |\n| Hybrid Compliance Automation | [Compliance automation](../capabilities/compliance-automation.md) + [hybrid scheduling](../capabilities/hybrid-scheduling.md) | RTO policies become enforceable without invasive tracking. |\n| Nexus Radar | [Nexus Radar](../capabilities/nexus-radar.md) | Early warning on multi-state tax-nexus risk. |\n\n# The Four Strategic Pillars\n\n1. **[Non-intrusive network presence detection](../capabilities/presence-detection.md)** \u2014 Detects actual physical presence using existing endpoint security, not badges or cameras.\n2. **[Compliance automation and progressive discipline](../capabilities/compliance-automation.md)** \u2014 Automates the attendance disciplinary lifecycle with accommodation-aware enforcement.\n3. **[Advanced hybrid scheduling](../capabilities/hybrid-scheduling.md)** \u2014 Creates and enforces hybrid schedules at scale.\n4. **[Office utilization and optimization](../capabilities/office-optimization.md)** \u2014 Real-time and historical analytics on actual office utilization.\n\nAcross all four, the
