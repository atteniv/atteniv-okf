 **[Atteniv Intelligence](../capabilities/atteniv-intelligence.md)**\nAI layer provides natural-language querying and proactive insight, included in\nevery tier.\n\n# Why It's Different\n\nAtteniv is the only platform that connects **where your people actually are**\n(network presence), **what your policies require** (compliance automation), and\n**what each state's rules demand** ([Nexus Radar](../capabilities/nexus-radar.md)) \u2014\nin one agnostic, multi-modal system.\n\n| Alternative | Why it falls short |\n|-------------|--------------------|\n| Badge / access systems | [Coffee badging](../concepts/coffee-badging.md) defeats them; no remote-worker visibility. |\n| HRIS location fields | Self-reported, stale, and not audit-grade. |\n| Employee monitoring tools | Invasive, culture-destroying, and not built for tax/compliance. |\n| Payroll-vendor nexus guides | Generic reference content; not connected to your actual workforce footprint. |\n\nSee the [competitive landscape](../concepts/competitive-landscape.md) for a\ncategory-by-category comparison.\n\n# Who It's For\n\nServes [HR operations](../personas/hr-operations.md),\n[facilities / real estate](../personas/facilities-real-estate.md),\n[compliance directors](../personas/compliance-director.md), and\n[VPs of payroll / CFOs](../personas/cfo.md). See [personas](../personas/index.md)\nfor the full list.\n\n# Integration & Deployment\n\n* **Presence sources**: Zscaler, Fortinet, Microsoft Defender, and similar network/SIEM stacks; optional lightweight client for environments without a cloud-security proxy.\n* **Identity**: SSO/SAML corroboration via the existing IdP.\n* **HRIS**: native integrations for org hierarchy and employee records.\n* **Badge**: QR-code generation for office check-in where badge workflows are needed.\n* **Data handling**: encrypted in transit and at rest; customer prompt data de-identified before any review; regulatory corpora restricted to authorized service identities.\n\nSee [integrations](../integrations/index.md) for the full catalog.\n\n# Citations\n\n[1] [Atteniv](https://atteniv.com)", "products/nexus-vision": "Nexus Vision is a **free, publicly available intelligence service** that gives\npayroll, HR, and finance professionals grounded, citation-backed answers to one\nof the hardest questions in the hybrid-work era: **how each U.S. state taxes the\nwages of remote and nonresident employees.** It launched in July 2026 and is\navailable on the web and via an API for integrators.\n\nIt covers how states handle income-tax withholding, how nonresident wages are\nsourced (including the [convenience-of-the-employer rule](../concepts/convenience-of-the-employer-rule.md)),\n[reciprocity agreements](../concepts/reciprocity.md), de-minimis thresholds and\ngrace periods, and local or city wage taxes \u2014 across all 50 states and the\nDistrict of Columbia.\n\n# The Problem It Addresses\n\nRemote and hybrid work made employee location flexible; state payroll,\nwithholding, and [nexus](../concepts/tax-nexus.md) rules did not become simple\nbecause work became flexible. The hard question is no longer \"Where does this\nemployee live?\" but \"**Where did work actually happen, which state rules apply,\nand can we prove what we knew at the time?**\"\n\nThis is not one national rule \u2014 it is a state-by-state problem, made harder by\n[convenience-of-the-employer rules](../concepts/convenience-of-the-employer-rule.md)\nand record-keeping requirements (e.g., Pennsylvania's demand for \"adequate\ncurrent records\" of nonresident-source compensation).\n\n# What It Does\n\nUnlike a static FAQ or a search engine, Nexus Vision answers **real\nsituations**. A user can ask about a single state or describe a scenario in\nplain language \u2014 for example, a Colorado company whose employee works remotely\nfrom Colorado but spends three months a year in California. Nexus Vision\nidentifies the states involved and returns a single synthesized answer that\nreasons across each state's rules plus the cross-state principles that tie them\ntogether \u2014 residency, credit for taxes paid to another state, day-based\nsourcing, and [reciprocity](../concepts/reciprocity.md) \u2014 with citations to the\nunderlying statutes.\n\nFor each covered jurisdiction, Nexus Vision provides:\n\n* **Linked statute and guidance views** \u2014 the underlying law, with key\n  provisions tagged to topics like payroll withholding, employer registration,\n  convenience-of-the-employer, and mobile workforce.\n* **Plain-English summaries** \u2014 concise explanations of what a rule means\n  operationally, written for HR and payroll audiences.\n* **Natural-language Q&A over the corpus** \u2014 ask questions in plain English and\n  get a grounded answer that cites the exact sections it relies on.\n* **Complexity ratings** \u2014 a color-coded posture map classifying states as\n  *no income tax*, *baseline*, *guardrail*, or *red-flag*.\n\n# Example Questions It Answers\n\n* What counts as New York-source income for a nonresident?\n* What is the \"convenience of the employer\" rule, and which states apply it?\n* How many days can an employee work in another state before triggering nexus?\n* What is the employer's liability if withholding was missed?\n* Can a single remote employee create corporate income tax nexus for our\n  business in their state?\n\n# Relationship to Nexus Radar\n\nThe same nexus knowledge corpus that powers Nexus Vision also drives\n[Nexus Radar](../capabilities/nexus-radar.md) inside the paid\n[Atteniv platform](atteniv-platform.md):\n\n* **Nexus Vision** is the *free, public research layer*.\n* **Nexus Radar** is the *proactive, paid platform feature* that connects\n  presence data to nexus risk.\n\nSee [two-plane architecture](../nexus-radar/two-plane-architecture.md) for how\nthe shared corpus is structured.\n\n# How to Access It\n\n* [Nexus Vision web app](../access/nexus-vision-web.md) \u2014 the free research copilot.\n* [Public REST API](../access/rest-api.md) \u2014 versioned browse plus authenticated grounded Q&A.\n* [MCP server](../access/mcp-server.md) \u2014 drop the corpus into any MCP-capable agent.\n\n# Guardrail\n\nNexus Vision is honest about where a situation calls for professional advice.\nAtteniv does not provide tax advice, determine tax liability, or replace tax\ncounsel.\n\n# Citations\n\n[1] [Nexus Vision](https://nexus.atteniv.com)\n[2] [Atteniv launch announcement \u2014 Nexus Vision](https://atteniv.com)", "references/source-material": "This bundle was authored on 2026-07-20 from the following internal Atteniv\ndocuments. They are the ground truth behind the concepts, capabilities, and\narchitecture described throughout.\n\n# Documents\n\n| Document | Feeds |\n|----------|-------|\n| *What Atteniv Is* | [Atteniv company](../company/atteniv.md), the four pillars, [competitive landscape](../concepts/competitive-landscape.md), [Atteniv Intelligence](../capabilities/atteniv-intelligence.md) tiers |\n| *Work Anywhere. Compliant Everywhere.* | [Atteniv platform](../products/atteniv-platform.md) overview, product surfaces, [Nexus Radar](../capabilities/nexus-radar.md) |\n| *Determining Office Presence* | All [presence methods](../presence-methods/index.md) |\n| *The Future of Compliance-First Workforce Intelligence* | AI roadmap in [Atteniv Intelligence](../capabilities/atteniv-intelligence.md) |\n| *Nexus Vision* (launch announcement) | [Nexus Vision product](../products/nexus-vision.md), [access channels](../access/index.md) |\n| *Nexus Radar in Atteniv* (Vision & Strategy, Early-Warning Engine, Requirements) | The entire [Nexus Radar architecture](../nexus-radar/index.md) section |\n\n# Notes & Open Items\n\n* **Hostname inconsistency** \u2014 source docs reference the Nexus public surface as\n  `nexus.atteniv.com`, `nexus.atteniv.app`, and `atteniv.com`. This bundle uses\n  `nexus.atteniv.com` as the canonical public host; confirm before external\n  publication. Flagged in [nexus-vision-web](../access/nexus-vision-web.md) and\n  [rest-api](../access/rest-api.md).\n* Internal design material is dated 2026-07-12 and marked \"Draft for review\";\n  roadmap tiers reflect intended, not necessarily shipped, functionality.\n\n# Citations\n\n[1] [Atteniv](https://atteniv.com)"}, "types": ["Access Channel", "Architecture", "Capability", "Company", "Concept", "Integration", "Persona", "Presence Method", "Product", "Reference", "Unknown"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
